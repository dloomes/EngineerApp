name: Deploy to Azure

# Push to main builds the whole monorepo once, then ships the pre-built
# artifacts to two Azure resources:
#   - frontend (apps/installation/dist) -> Azure Static Web App
#   - proxy    (api/dynamics)           -> Azure Function App
# Building here (rather than letting Azure's Oryx builder run) avoids the
# npm-workspace resolution problems that come with a monorepo.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      # --- Frontend -> Static Web App -------------------------------------
      # skip_app_build: the dist is already built above. app_location points
      # straight at the build output.
      - name: Deploy frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: apps/installation/dist
          api_location: ""
          skip_app_build: true
          skip_api_build: true

      # --- Proxy -> Function App ------------------------------------------
      # Isolated production install so the deployed package carries only
      # @azure/functions (the sole runtime dep; @involve/* are type-only and
      # erased at build time).
      #
      # `npm install --omit=dev` still resolves the FULL tree (incl. dev) before
      # pruning, so it would try to fetch the workspace-only @involve/* devDeps
      # from the public registry and 404. We strip devDependencies first — the
      # build that needed them has already run by this point.
      - name: Install proxy production deps
        working-directory: api/dynamics
        run: |
          npm pkg delete devDependencies
          npm install --omit=dev --no-workspaces --no-package-lock --ignore-scripts

      - name: Deploy proxy
        uses: Azure/functions-action@v1
        with:
          app-name: involve-engineerapp-api
          package: api/dynamics
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
          scm-do-build-during-deployment: false
          enable-oryx-build: false
